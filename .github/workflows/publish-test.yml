name: Publish to TestPyPI

on:
  push:
    branches: [development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Append .devN version suffix
        run: |
          VERSION=$(python -c "
          import re
          with open('core/pyproject.toml') as f:
              content = f.read()
          match = re.search(r'version\s*=\s*\"(.+?)\"', content)
          print(match.group(1))
          ")
          DEV_VERSION="${VERSION}.dev${GITHUB_RUN_NUMBER}"
          sed -i "s/version = \"${VERSION}\"/version = \"${DEV_VERSION}\"/" core/pyproject.toml
          sed -i "s/__version__ = \"${VERSION}\"/__version__ = \"${DEV_VERSION}\"/" core/src/agenticassure/__init__.py
          echo "Publishing version: ${DEV_VERSION}"

      - name: Build package
        run: python -m build core/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: core/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
